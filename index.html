<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semainier des activités</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    :root {
      font-family: Inter, Arial, sans-serif;
      color: #222;
      background: #f6f7f9;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 14px; }
    .toolbar {
      display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
      margin-bottom: 14px; padding: 12px; background: white;
      border: 1px solid #dfe3e8; border-radius: 10px;
    }
    .toolbar label { font-weight: 700; }
    select, button {
      min-height: 38px; padding: 7px 10px; border: 1px solid #b9c0c8;
      border-radius: 7px; background: white; font-size: 14px;
    }
    select { flex: 1; min-width: 220px; }
    button { cursor: pointer; font-weight: 600; }
    .name {
      margin: 0 0 12px; font-size: 24px; text-align: center;
    }
    .week {
      display: grid; grid-template-columns: repeat(5, minmax(180px, 1fr));
      gap: 10px; align-items: start;
    }
    .day {
      background: white; border: 1px solid #dfe3e8; border-radius: 10px;
      overflow: hidden; min-height: 220px;
    }
    .day h2 {
      margin: 0; padding: 11px; text-align: center; font-size: 17px;
      background: #e8edf3; border-bottom: 1px solid #d7dce2;
    }
    .items { padding: 9px; display: flex; flex-direction: column; gap: 8px; }
    .activity {
      border-left: 5px solid #555; background: #fafafa;
      border-radius: 7px; padding: 9px; box-shadow: 0 1px 2px rgba(0,0,0,.06);
    }
    .time { font-weight: 800; font-size: 14px; margin-bottom: 4px; }
    .title { font-size: 15px; font-weight: 700; margin-bottom: 5px; }
    .detail { font-size: 12px; color: #555; line-height: 1.4; }
    .empty { padding: 18px 8px; text-align: center; color: #888; font-style: italic; }
    .message { padding: 25px; text-align: center; color: #666; }
    @media (max-width: 1050px) {
      .week { grid-template-columns: repeat(2, minmax(220px, 1fr)); }
    }
    @media (max-width: 560px) {
      body { padding: 8px; }
      .week { grid-template-columns: 1fr; }
    }
    @media print {
      body { background: white; padding: 0; }
      .toolbar { display: none; }
      .week { grid-template-columns: repeat(5, 1fr); gap: 5px; }
      .day { break-inside: avoid; }
      .activity { box-shadow: none; }
      .name { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <label for="personSelect">Personne :</label>
    <select id="personSelect"></select>
    <button id="printButton" type="button">Imprimer</button>
  </div>

  <h1 id="personName" class="name">Planning hebdomadaire</h1>
  <main id="week" class="week">
    <div class="message">Chargement du planning…</div>
  </main>

  <script>
    const DAYS = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi"];
    let allRecords = [];

    const normalize = (value) => String(value ?? "").trim();
    const personValue = (record) => normalize(record.Personne);

    function minutes(value) {
      if (value === null || value === undefined || value === "") return 9999;
      if (typeof value === "number") {
        // Grist Time can arrive as seconds since midnight.
        return Math.floor(value / 60);
      }
      const match = String(value).match(/(\d{1,2})[:h](\d{2})/i);
      return match ? Number(match[1]) * 60 + Number(match[2]) : 9999;
    }

    function formatTime(value) {
      if (value === null || value === undefined || value === "") return "";
      if (typeof value === "number") {
        const totalMinutes = Math.floor(value / 60);
        const h = Math.floor(totalMinutes / 60);
        const m = totalMinutes % 60;
        return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
      }
      return normalize(value).replace("h", ":");
    }

    function refreshPeople() {
      const select = document.getElementById("personSelect");
      const previous = select.value;
      const people = [...new Set(allRecords.map(personValue).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "fr", {sensitivity: "base"}));

      select.innerHTML = "";
      people.forEach(person => {
        const option = document.createElement("option");
        option.value = person;
        option.textContent = person;
        select.appendChild(option);
      });

      if (people.includes(previous)) select.value = previous;
      else if (people.length) select.value = people[0];

      render();
    }

    function render() {
      const selected = document.getElementById("personSelect").value;
      const week = document.getElementById("week");
      document.getElementById("personName").textContent =
        selected ? `Planning hebdomadaire – ${selected}` : "Planning hebdomadaire";

      if (!selected) {
        week.innerHTML = '<div class="message">Aucune personne trouvée. Vérifiez le paramétrage des colonnes.</div>';
        return;
      }

      const records = allRecords.filter(r => personValue(r) === selected);
      week.innerHTML = "";

      DAYS.forEach(dayName => {
        const day = document.createElement("section");
        day.className = "day";

        const heading = document.createElement("h2");
        heading.textContent = dayName;
        day.appendChild(heading);

        const items = document.createElement("div");
        items.className = "items";

        const dayRecords = records
          .filter(r => normalize(r.Jour).toLowerCase() === dayName.toLowerCase())
          .sort((a, b) => minutes(a.Debut) - minutes(b.Debut));

        if (!dayRecords.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "Aucune activité";
          items.appendChild(empty);
        } else {
          dayRecords.forEach(r => {
            const card = document.createElement("article");
            card.className = "activity";
            if (normalize(r.Couleur)) card.style.borderLeftColor = normalize(r.Couleur);

            const start = formatTime(r.Debut);
            const end = formatTime(r.Fin);
            const timeText = start && end ? `${start} – ${end}` : (start || end);

            const time = document.createElement("div");
            time.className = "time";
            time.textContent = timeText || "Horaire non renseigné";

            const title = document.createElement("div");
            title.className = "title";
            title.textContent = normalize(r.Activite) || "Activité";

            card.appendChild(time);
            card.appendChild(title);

            const details = [];
            if (normalize(r.Salle)) details.push(`Salle : ${normalize(r.Salle)}`);
            if (normalize(r.Professionnel)) details.push(`Avec : ${normalize(r.Professionnel)}`);
            if (normalize(r.Notes)) details.push(normalize(r.Notes));

            if (details.length) {
              const detail = document.createElement("div");
              detail.className = "detail";
              detail.innerHTML = details.map(x => `<div>${escapeHtml(x)}</div>`).join("");
              card.appendChild(detail);
            }
            items.appendChild(card);
          });
        }

        day.appendChild(items);
        week.appendChild(day);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById("personSelect").addEventListener("change", render);
    document.getElementById("printButton").addEventListener("click", () => window.print());

    grist.ready({
      requiredAccess: "read table",
      columns: [
        {name: "Personne", title: "Personne", type: "Any"},
        {name: "Jour", title: "Jour", type: "Text"},
        {name: "Debut", title: "Heure de début", type: "Any"},
        {name: "Fin", title: "Heure de fin", type: "Any", optional: true},
        {name: "Activite", title: "Activité", type: "Any"},
        {name: "Salle", title: "Salle", type: "Any", optional: true},
        {name: "Professionnel", title: "Professionnel", type: "Any", optional: true},
        {name: "Couleur", title: "Couleur", type: "Text", optional: true},
        {name: "Notes", title: "Notes", type: "Text", optional: true}
      ]
    });

    grist.onRecords((records) => {
      allRecords = records || [];
      refreshPeople();
    }, {mapping: true});
  </script>
</body>
</html>
