<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Planning individuel SAJ</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
</head>
<body>
  <header class="toolbar no-print">
    <div class="brand"><div class="brand-mark">SAJ</div><div><h1>Planning individuel</h1><p>SAJ Anagallis</p></div></div>
    <div class="controls">
      <label>Personne<select id="personSelect"><option>Chargement…</option></select></label>
      <label>Format<select id="printFormat"><option value="a4">A4 paysage</option><option value="a3">A3 paysage</option></select></label>
      <label class="toggle"><input id="showEmpty" type="checkbox" checked> Créneaux vides</label>
      <button id="opacityButton" class="secondary" type="button">Opacité des jours</button>
      <button id="printButton" type="button">Imprimer / PDF</button>
      <button id="refreshButton" class="secondary" type="button">Actualiser</button>
    </div>
  </header>

  <main id="app">
    <div id="status" class="status">Connexion à Grist…</div>
    <section id="sheet" class="sheet hidden">
      <header class="sheet-head">
        <div class="identity">
          <div id="portrait" class="portrait">?</div>
          <div>
            <p class="eyebrow">PLANNING HEBDOMADAIRE</p>
            <h2 id="personName">—</h2>
            <p id="presenceText" class="presence-text"></p>
          </div>
        </div>
        <img
          class="saj-logo"
          src="logo.png"
          alt="Logo du SAJ"
          onerror="this.style.display='none'"
        >
      </header>
      <div class="week-banner" aria-label="Jours de la semaine">
        <span>Lundi</span><span>Mardi</span><span>Mercredi</span><span>Jeudi</span><span>Vendredi</span>
      </div>
      <div id="week" class="week-grid"></div>
      <footer class="sheet-foot">Odynéo - Les Tourrais de Craponne - Service d'accueil de Jour Anagallis.</footer>
    </section>
  </main>

  <dialog id="opacityDialog"><form method="dialog"><h3>Opacité du fond des jours</h3><div id="opacityControls"></div><div class="dialog-actions"><button id="resetOpacity" class="secondary" type="button">Valeurs par défaut</button><button value="close">Fermer</button></div></form></dialog>
  <dialog id="errorDialog"><h3>Impossible de charger le planning</h3><pre id="errorText"></pre><button onclick="this.closest('dialog').close()">Fermer</button></dialog>
  <script src="script.js"></script>
</body>
</html>
